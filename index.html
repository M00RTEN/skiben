<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skiben</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            border: 1px solid #334155;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }
        p {
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 1.5rem;
        }
        .footer-text {
            font-weight: bold;
            color: #facc15;
            font-size: 1.1rem;
            padding-top: 1rem;
            border-top: 1px solid #334155;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="skiben.png.png" alt="Skiben">
        <h1>Vi beklager</h1>
        <p>Vi skulle ønske vi kunne ha Skiben på vår server. Han er en enormt rå streamer, men vi har dessverre ikke nok upload på vår server til å få han på nett, så dette overlater vi til datasentre som har nok upload.</p>
        <p class="footer-text">Vi elsker hvert tonn av deg, Skiben!</p>
    </div>

</body>
</html>
